[KeyBindCycles]
; Allow for cycling through self + group targets with just one key
TargetCycleGroup = ${GroupSize}: TargetSelf, TargetGroup1-5
; Allow for cycling through hotbar pages with next and prev
HotPageCycle = ${HotbarPageCount}, 2: HotPage1-10

[Hotspots]
; Want this in a spot where there's unlikely to be any UI windows
MouseLookStart = R, B
; Want this to be somewhere that cursor isn't visible
MouseHidden = R, B
; Used to display indicator for group member last targeted
TargetSelf = ${MyWinX} + ${TargetSelfX}, ${MyWinY} + ${TargetSelfY}
TargetGroup = ${GroupWinX}, ${GroupWinY}
TargetGroup1 = ${TargetGroup1X}, ${TargetGroup1Y}
TargetGroup2-5 = +0, ${TargetGroupDY}
; Used for spell memorization menu for icons in spell book
SpellBook = ${BookWinX}, ${BookWinY}, 40, 40
SpellBook1 = ${BookSpell1X}, ${BookSpell1Y}
SpellBook2-8 = ${BookSpellDX} @ 4, ${BookSpellDY}
SpellBook9 = ${BookSpell9X}, ${BookSpell9Y}
SpellBook10-16 = ${BookSpellDX} @ 4, ${BookSpellDY}
; Primarily used for copying spell icons
SpellSlot = ${SpellGemsWinX}, ${SpellGemsWinY}, ${SpellGemW}, ${SpellGemH}
SpellSlot1 = ${SpellGem1X}, ${SpellGem1Y}
SpellSlot2-8 = ${SpellGemDX}, ${SpellGemDY}
; Used for copying spell names on UI's that include them
SpellName = ${SpellGemsWinX}, ${SpellGemsWinY}, ${SpellNameW}, ${SpellNameH}
SpellName1 = ${SpellName1X}, ${SpellName1Y}
SpellName2-8 = ${SpellNameDX}, ${SpellNameDY}
; Primarily used for copying hotbar iconsHotbarWinX = 0
Hotbar = ${HotbarWinX}, ${HotbarWinY}, ${HotButtonW}, ${HotButtonH}
Hotbar1 = ${HotButton1X}, ${HotButton1Y}
Hotbar2-10 = ${HotButtonDX}, ${HotButtonDY} @ 2
; Used for quick navigation of loot window
LootWindow = ${LootWinX}, ${LootWinY}
LootWindow1 = ${LootWin1X}, ${LootWin1Y}
LootWindow2-16 = ${LootWinDX}, ${LootWinDY} @ ${LootWinColCount}
LootWindow17 = ${UISkin = duxaui ? ${LootWin1X}, ${LootWin1Y + ${LootWinDY * 2}}}
LootWindow18-32 = ${LootWinDX}, ${LootWinDY} @ ${LootWinColCount}
; Used for quick navigation of inventory window
Inventory = ${InvWinX}, ${InvWinY}
Inventory1 = +62, +23
Inventory2-5 = +39, +0
Inventory6 = +23, +62
Inventory7-17 = +39, +39 @ 6
Inventory18 = +101, +140
Inventory19-21 = +39, +0
Inventory22 = +180, +189
Inventory23-29 = +39 @ 4, +39
Inventory30 = +128, +194
Inventory31-33 = +0, +39
Inventory34 = +269, +12
Inventory35 = +298, +382
InvDuxa = ${InvWinX}, ${InvWinY}
InvDuxa1 = +72, +40
InvDuxa2-5 = +42, +0
InvDuxa6 = +30, +82
InvDuxa7-17 = +42, +42 @ 6
InvDuxa18 = +112, +168
InvDuxa19-21 = +42, +0
InvDuxa22 = +196, +210
InvDuxa23-29 = +44 @ 4, +44
InvDuxa30 = +134, +202
InvDuxa31-33 = +0, +24
InvDuxa34 = +135, +325
InvDuxa35 = +135, +350
; Extra inventory slots shown in hotbar window in duxaui
ExtraDuxa = ${HotbarWinX}, ${HotbarWinY}
ExtraDuxa1 = +112, +25
ExtraDuxa2-12 = +41, +41 @ 2

[LabelIcons]
Spell1-8 = SpellSlot#
SpellName1-8 = SpellName#
Hotbar1-10 = Hotbar#

[Appearance]
ItemRGB = ${UISkin = duxaui ? "43, 43, 43" : "196, 188, 174"}
BorderRGB = ${UISkin = duxaui ? "0, 0, 0," : "107, 103, 93"}
LabelRGB = ${UISkin = duxaui ? "255, 255, 255" : "0, 0, 0"}
SelectedItemRGB = ${UISkin = duxaui ? "57, 85, 132" : "184, 179, 155"}
SelectedBorderRGB = ${UISkin = duxaui ? "0, 0, 0" : "107, 103, 93"}
SelectedLabelRGB = 255, 255, 0
FlashItemRGB = ${UISkin = duxaui ? "25, 42, 75" : "148, 138, 122"}
HotspotGuideAlpha = ${HotspotGuideAlpha}
HotspotGuideRGB = 180, 180, 180
HotspotGuideSize = ${ResScale * 9}
HotspotGuideDisplayTime = 1000

[Mouse]
MoveLookSpeed = 16
DefaultHotspotDistance = 40
WheelJumpDelayTimePerStep = 35
TurnStartThrottleDistance = 35
; Workaround for EQT client bug that causes issues if keep Mouse Look active while zoning
CameraIdleResetTime = 3000

