[System]
WindowName = EQ P99 Gamepad Overlay
TargetWindowName = EverQuest
AutoLaunchApp = eqgame.exe
AutoLaunchAppParams = patchme
QuitWhenAutoLaunchAppDoes = No
QuitWhenTargetWindowCloses = No
ForceFullScreenWindow = Yes
StartInFullScreenWindow = No
; 'F1' is a shortcut for F1-F12, and 'Num0' for Num0-Num9
SafeAsyncKeys = MMB Esc F1 Num0 NumDiv NumLock Left Right Up Down PgUp PgDown Home End Ins
IconCopyMethod = 2
