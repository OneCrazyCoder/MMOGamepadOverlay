[KeyBindCycles]
; Allow for cycling through self + group targets with just one key
TargetCycleGroup = ${GroupSize}: TargetSelf, TargetGroup1-5
; Allow for cycling through hotbar pages with next and prev
HotPageCycle = ${HotbarPageCount}, 2: HotPage1-10

[Hotspots]
; Want this in a spot where there's unlikely to be any UI windows
MouseLookStart = R, B
; Want this to be somewhere that cursor isn't visible
MouseHidden = R, B
; Based on default P99 UI @ 1280x720 resolution
TargetSelf = R-60, B-197
TargetGroup = R-125, B-166
TargetGroup1 = +65, +25
TargetGroup2-5 = +0, +27
; Used for spell memorization menu for icons in spell book
SpellBook = 232, 154, 40, 40
SpellBook1 = +91, +57
SpellBook2-16 = +86 @ 4, +67
; Used for spell memorization menu for r-click to forget spells
SpellSlot1 = 35, 21, 36, 28
SpellSlot2-8 = +0, +29
; Used for copying hotbar icons
Hotbar = 0, 430, 40, 40
Hotbar1 = +26, +44
Hotbar2-10 = +44, +44 @ 2
; Used for quick navigation of loot window
LootWindow = 0x169
LootWindow1 = +32, +71
LootWindow2-16 = +41, +41 @ 2
; Used for quick navigation of inventory window
