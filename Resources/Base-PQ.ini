[KeyBindCycles]
; Allow for cycling through self + group targets with just one key
TargetCycleGroup = ${GroupSize}: TargetSelf, TargetGroup1-5
; Allow for cycling through hotbar pages with next and prev
HotPageCycle = ${HotbarPageCount}, 2: HotPage1-10

[Hotspots]
; Want this in a spot where there's unlikely to be any UI windows
MouseLookStart = R, B
; Want this to be somewhere that cursor isn't visible
MouseHidden = R, B
; Used to display indicator for group member last targeted
TargetSelf = ${MyWinX}+64, ${MyWinY}+39
TargetGroup = ${GroupWinX}, ${GroupWinY}
TargetGroup1 = +59, +30
TargetGroup2-5 = +0, +24
; Used for spell memorization menu for icons in spell book
SpellBook = ${BookWinX}, ${BookWinY}, 40, 40
SpellBook1 = +110, +60
SpellBook2-8 = +86 @ 4, +67
SpellBook9 = +296, +60
SpellBook10-16 = +86 @ 4, +67
; This is the "Done" button
SpellBook17 = +245, +377, 98, 26
; Used for spell memorization menu for r-click to forget spells
SpellSlot = ${SpellGemsWinX}, ${SpellGemsWinY}, 40, 32
SpellSlot1 = +25, +20
SpellSlot2-8 = +0, +33
; Used for copying hotbar icons
Hotbar = ${HotbarWinX}, ${HotbarWinY}, 40, 40
Hotbar1 = +26, +58
Hotbar2-10 = +42, +40 @ 2
; Used for quick navigation of loot window
LootWindow = ${LootWinX}, ${LootWinY}
LootWindow1 = +29, +80
LootWindow2-16 = +45, +40 @ 2
; This is the "Done" button
LootWindow17= +60, +400
; Used for quick navigation of inventory window
Inventory = ${InvWinX}, ${InvWinY}
Inventory1 = +144, +38
Inventory2-5 = +40, +0
Inventory6 = +304, +78
Inventory7-10 = +0, +40
Inventory11 = +144, +78
Inventory12-15 = +0, +40
Inventory16 = +204, +278
Inventory17 = +243, +278
Inventory18 = +165, +317
Inventory19-21 = +40, +0
Inventory22 = +354, +198
Inventory23-25 = +0, +40
Inventory26 = +393, +198
Inventory27-29 = +0, +40
Inventory30 = +166, +360
Inventory31-33 = +69, +0
Inventory34 = +48, +389
Inventory35 = +292, +389

[LabelIcons]
Spell1-8 = SpellSlot#
Hotbar1-10 = Hotbar#

[Appearance]
ItemRGB = 196, 188, 174
BorderRGB = 107, 103, 93
SelectedBorderRGB = 107, 103, 93
SelectedItemRGB = 184, 179, 155
SelectedLabelRGB = 255, 255, 0
FlashItemRGB = 148, 138, 122
HotspotGuideAlpha = ${HotspotGuideAlpha}
HotspotGuideRGB = 180, 180, 180
HotspotGuideSize = ${ResScale * 9}
HotspotGuideDisplayTime = 1000

[Mouse]
MoveLookSpeed = 20
DefaultHotspotDistance = 40
TurnStartThrottleDistance = 35

[Variables]
GroupSize = 6
HotbarPageCount = 3
HotspotGuideAlpha = 0
; These default positions are based on the game's defaults @ 720p,
; but below Target Config auto-sync system should update them to your settings
MyWinX = 1156
MyWinY = 0
GroupWinX = 1156
GroupWinY = 198
BookWinX = 360
BookWinY = 130
BookWinCX = ${BookWinX + 250}
BookWinCY = ${BookWinY + 197}
SpellGemsWinX = 0
SpellGemsWinY = 145
HotbarWinX = 0
HotbarWinY = 470
LootWinX = 0
LootWinY = 145
InvWinX = 420
InvWinY = 170

; Auto-sync some variables to values in config files written by the game
[TargetConfigFiles]
UI = ${TargetAppDir}UI_*_pq.proj.ini

[TargetConfigFormat]
PositionX = UI.<name>.XPos${W}x${H}
PositionY = UI.<name>.YPos${W}x${H}
; Unused: AlignmentX/Y, PivotX/Y, Width, Height, Scale

[TargetConfigVariables]
MyWinX = X:PlayerWindow
MyWinY = Y:PlayerWindow
GroupWinX = X:GroupWindow
GroupWinY = Y:GroupWindow
BookWinX = X:SpellBookWnd
BookWinY = Y:SpellBookWnd
SpellGemsWinX = X:CastSpellWnd
SpellGemsWinY = Y:CastSpellWnd
HotbarWinX = X:HotButtonWnd
HotbarWinY = Y:HotButtonWnd
LootWinX = X:LootWnd
LootWinY = Y:LootWnd
InvWinX = X:InventoryWindow
InvWinY = Y:InventoryWindow

[System]
WindowName = EQ PQ Gamepad Overlay
TargetWindowName = Client1
AutoLaunchApp = eqgame.exe
QuitWhenAutoLaunchAppDoes = No
QuitWhenTargetWindowCloses = No
; 'F1' is a shortcut for F1-F12, and 'Num0' for Num0-Num9
SafeAsyncKeys = MMB Esc F1 Num0 NumAdd NumSub NumMult NumLock Left Right Up Down PgUp PgDown Home End Ins
PromptForTargetConfigSyncFiles = Yes
