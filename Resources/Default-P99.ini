ParentProfile = MMOGO_P99_Base

# Remove below line to stop automatic replacement by newer versions of the app
AutoGeneratedVersion = 0

###############################################################################
## BASIC CONTROLS
##
## This control scheme is designed to emulate that used by the PS2 MMO "EQOA".
##
## Additional actions not included in EQOA like jump, sit, and mouse-dependent
## tasks like inventory management needed to be added by things like holding a
## button briefly vs tapping it doing different things, or button combinations
## (usually with L2, such as L2+D-Pad to use mouse wheel for camera zoom or
## scrolling chat window text). Some buttons also have different actions for
## different contextual "modes" - cursor, menu, macros, or action mode.
##
## The face button assignments were swapped around from EQOA's layout to be
## more like modern games (i.e. Circle instead of Triangle for "cancel"), but
## an option is included to swap these back via Main Menu->Overlay->Settings.
##
## Basic Controls:
##
## Left Analog Stick - Move character
## Right Analog Stick - Move mouse (cursor or camera)
## D-Pad - Navigate menus / jump mouse cursor, [L2] Mouse wheel / camera zoom
##         (Hold) Edit macro in Macros menu
##
## Circle - [Tap] Esc/Cancel/Back, [Hold] Sit
## Square - Toggle Auto-attack
## Triangle - Use Ability / Switch to Action Mode
## X - Confirm menu selections / Left-click / Switch to Cursor Mode
##     [L1] Shift-click, [R1] Ctrl-click, [L1+R1] Alt-click
##
## L1 - Target self/pet/group members (see TARGET GROUP section for details)
## R1 - Target NPCs, [L2] Target PCs
## L2 - [Tap] Switch to Macros Mode, [Hold] Modify other buttons
## R2 - Right-click / Use/Loot Center Screen, [L2] Loc/Sense Heading
##
## L3 - [Tap] Auto run, [L2] Lock movement (aka auto-strafe-run)
##      [Hold] Re-center 1st-person camera
## R3 - Jump, [L2] Duck
## Start - Menus Mode, [L2] Toggle Inventory, [L2 & Hold] Toggle Bags
## Select - [Tap] Change camera mode, [Hold] Alternate camera controls
###############################################################################

[Scheme]
LStick = ${CamSteer ? MoveAndLook : MoveStrafe}
RStick = Move mouse

Square = Attack
Tap Circle = Cancel
Hold Circle = Sit
Tap Triangle = Add ActionMode layer
Tap PS-X = Add WantMouseCursor layer

Tap L1 = TargetCycleGroup
Tap R1 = TargetCycleNPC, pause 100, Consider
Tap L2 = Add MacrosMode layer
Tap R2 = Interact

Tap L3 = AutoRun
Hold L3 = CenterView
R3 = Jump
Tap Select = CameraMode
Select = Hold AltCamera layer
Start = Add MenuMode layer

; Holding these shoulder buttons acts as modifiers for other buttons
L1 = Hold L1Held layer
L2 = Hold L2Held layer
R1 = Hold R1Held layer

; Outside of CursorMode, default to controlling camera (via mouse-look)
Mouse = LookTurn
; ..but start out with cursor control initially for Windows, login, etc
AutoLayers = CursorMode, LStickNeutral, RStickNeutral
; Used to aim R2 clicks while controlling camera (to loot/etc)
ShowMenus = ${ShowReticle ? InteractReticle}
; Alternate face button layout if want one more true to EQOA
ButtonSwap = ${ButtonMap = EQOA ? Square with PS-X, Circle with Triangle : None}


###############################################################################
## L2 MODIFIER
##
## Holding L2 acts like a "shift key" that changes what many other buttons do,
## with no particular unifying theme for what L2 means as a whole - it should
## just be considered a way to access a second set of buttons.
###############################################################################

[Layer.L2Held]
DPad = MouseWheel
; Use Windows Magnifier if WinMag set to true
DPad Left = ${WinMag ? Win-Minus}
DPad Right = ${WinMag ? Win-Plus}
L1 = TargetLast
Tap R1 = TargetCyclePC, pause 100, WhoTarget
L3 = Defer to lower layers
R2 = Heading
Tap L3 = Lock movement
R3 = Duck
Tap Start = Inventory
Hold Start = Bags


###############################################################################
## SELECT (CAMERA CONTROLS) MODIFIER
##
## Holding Select modifies some buttons to access additional camera controls,
## since in some camera modes the mouse alone doesn't cover all camera options.
###############################################################################

[Layer.AltCamera]
RStick Up = Alt+Up
RStick Down = Alt+Down
RStick Left = Alt+Left
RStick Right = Alt+Right
FPad Up = Alt+Up
FPad Down = Alt+Down
FPad Left = Alt+Ins
FPad Right = Alt+Del


###############################################################################
## ACTION MODE
##
## This mode is activated by pressing Triangle or just moving with LStick.
##
## Use D-Pad to select and Triangle to use an Ability via an overlay menu.
##
## R2 will use the Interact key bind which left-clicks then right-clicks at the
## InteractHotspot (center screen) to open doors, shop/bank, and loot corpses.
## An optional reticle shows this click location. When use R2 to loot a corpse,
## keep tapping R2 repeatedly to rapidly loot all corpse contents.
###############################################################################

[Layer.ActionMode]
DPad = Select item in Abilities with wrapping
Triangle = Confirm current selection in Abilities
; Quickly jump back to primary ability list by holding left/right briefly
Hold DPad Left = Abilities back
Hold DPad Right = Abilities back

ShowMenus = Abilities
Priority = 1
AutoLayers = Remove CursorMode and MenuMode


###############################################################################
## MENU MODE
##
## This mode is activated by pressing Start/Options/Menu.
##
## Use D-pad to select and X to confirm a menu option. Circle backs out.
##
## Pressing any direction on Right Analog Stick switches to Cursor Mode.
## This is useful after using a menu option that toggles an in-game UI Window.
###############################################################################

[Layer.MenuMode]
DPad = Select item in MainMenu using wrapping
PS-X = Confirm current selection in MainMenu
Tap Circle = Go back in MainMenu
Circle = Defer to lower layers

Start = Replace this layer with WantMouseCursor
R2 = Replace this layer with WantMouseCursor
Press DPad Left = Replace this layer with WantMouseCursor
Press DPad Right = Replace this layer with WantMouseCursor
DPad Left = Select Hotspot Left
Dpad Right = Select Hotspot Right

ShowMenus = MainMenu
Priority = 2
AutoLayers = Remove WantMouseCursor, CursorMode, MacrosMode, and ActionMode
Auto = Reset MainMenu
ButtonSwap = ${ButtonMap = EQOA ? Circle with Triangle : None}

[Layer.SettingsMenuMode]
DPad = Select in Settings menu w/ wrap
DPad Left = Confirm current selection in Settings menu
DPad Right = Confirm current selection in Settings menu
PS-X = Confirm current selection in Settings menu
Tap Circle = Go back in Settings menu
Circle = Defer to lower layers

Parent = MenuMode
ShowMenus = Show Settings, Hide MainMenu
Auto = Reset Settings menu


###############################################################################
## MACROS MODE
##
## This mode is activated with a tap (not hold!) of L2.
##
## This displays 4 menu options at a time, one for each D-Pad direction.
## Pressing a direction immediately opens another 4-directional sub-menu OR
## executes a command - usually a chat box string or slash command.
##
## This enables a large amount of possible commands to be executed quickly by
## "dialing in" a direction sequence, like L2->U->L->D to warn of a train, or
## L2->U->U to hail an NPC. With time most sequences will become muscle memory.
##
## Edit/add/remove macros/sub-menus by holding a D-pad direction for a time.
###############################################################################

[Layer.MacrosMode]
Tap DPad = Select item in Macros menu then close it
Hold DPad 800 = Edit Macros menu item in direction
Tap Circle = Go back in Macros menu
Circle = Defer to lower layers

Tap Triangle = Remove this layer
Press L2 = Remove this layer
L2 = Hold L2Held layer

ShowMenus = Macros, Hide Abilities
Priority = 3
AutoLayers = ActionMode
Auto = Reset Macros menu


###############################################################################
## CURSOR MODE
##
## When mode is activated by pressing X, R2, or moving the Right Analog STick
## while in Menu mode. You will also need to stop holding any direction on the
## Left Analog Stick (can use auto-run to move while using the cursor).
##
## Use Right Analog Stick and D-Pad to move the mouse cursor.
## X = left-click and R2 = right-click.
## L1+X/R2 = shift-click, R1+X/R2 = ctrl-click, and L1+R1+X/R2 = alt-click
##
## RStick gives finer control, D-Pad jumps quickly - but can home in on nearby
## hotspots (e.g. Loot/Inventory slots) for fast and precise cursor movement.
##
## While holding X, LStick moves the cursor (since right thumb is busy).
##
## No overlay menus are available like in the other modes, to prevent any
## from obscuring the in-game interface that might be clicked on.
###############################################################################

[Layer.CursorMode]
Mouse = Cursor
DPad = Select Hotspot
PS-X = Hold LeftClickAndDrag layer
R2 = RMB

Hotspots = Inventory, LootWindow, Hotbar, Spellslot
Priority = 4
AutoLayers = Remove WantMouseCursor, ActionMode, MenuMode, and MacrosMode
ShowMenus = Hide InteractReticle
Tap R2 = SignalRightClick
Tap PS-X = SignalLeftClick

[Layer.CursorMode+L1Held]
PS-X = Hold ShiftClickAndDrag layer
R2 = Shift+RMB
[Layer.CursorMode+R1Held]
PS-X = Hold CtrlClickAndDrag layer
R2 = Ctrl+RMB
[Layer.CursorMode+L1Held+R1Held]
PS-X = Hold AltClickAndDrag layer
R2 = Alt+RMB

[Layer.LeftClickAndDrag]
Auto = LMB
LStick = Mouse
[Layer.ShiftClickAndDrag]
Auto = Shift+LMB
LStick = Mouse
[Layer.CtrlClickAndDrag]
Auto = Ctrl+LMB
LStick = Mouse
[Layer.AltClickAndDrag]
Auto = Alt+LMB
LStick = Mouse


###############################################################################
## TARGET GROUP
##
## Tap L1 to target the default group target (yourself), or tap it repeatedly
## to cycle through targeting each group member slot.
##
## A small arrow appears to indicate which group member is "last targeted",
## which in turn determines which group member is cycled to for next L1 press.
## When this is not displayed, next L1 resets to default target (self) again.
##
## Hold L1 and use the D-Pad for expanded group targeting functionality:
##
##   L1 + Up/Down  = Previous / Next group member
##   L1 + Right    = Cycle targeting last group member and their pet
##   L1 + Left     = Set last group member as default target instead of self
##                   (like main tank for a healer or main assist for a DPS)
##
## Assist: Hold L1 and press R1 to assist your current target.
## Or: If the yellow indicator is visible, simply press R1 to assist once.
##
## NOTE: The app has no means of reading current group size from the game, but
## you can manually set it for faster cycling via Start->Group Size.
###############################################################################

[Layer.L1Held]
DPad Up = TargetCycleGroup previous
DPad Down = TargetCycleGroup next
DPad Right = TargetCycleGroup repeat
DPad Left = Add SetDefaultGroupTarget layer
Tap R1 = Assist, pause 100, Consider
R1 = Hold R1Held layer
ShowMenus = TargetGroupDefault

[Scheme]
When TargetSelf = Add ShowLastGroupTarget layer
When TargetParty# = Add QuickAssist layer

[Layer.ShowLastGroupTarget]
ShowMenus = TargetGroupLast
Priority = 6
Release Auto = Reset TargetCycleGroup

[Layer.QuickAssist]
Parent = ShowLastGroupTarget
Tap R1 = Assist, pause 100, Consider
R1 = Defer to lower layers
When TargetSelf = Remove this layer


###############################################################################
## MEMORIZE SPELLS
##
## Accessible from the main menu, this special menu allows for faster spell
## memorization than just using Cursor Mode controls, by using the DPad to
## quickly select a spell and then a spell slot to memorize it to (first
## forgetting whatever was already in that slot).
##
## If the book was already open, starting this menu might close it - simply
## tap LStick Down to bring it back again. You can also use LStick L/R or
## L1/R1 to flip through the spell book pages. Since the mouse cursor will
## move with the menu selection, you can use R2 to right-click in order to
## inspect a spell or swap spells around. Using RStick cancels to Cursor Mode.
###############################################################################

[Layer.MemSpells]
DPad = Select in MemSpells w/ wrap
PS-X = Confirm current selection in MemSpells menu
L1 = BookPrevPage
R1 = BookNextPage 
R2 = RMB
Press Circle = CloseBook
Circle = Remove this layer
Press Triangle = CloseBook
Triangle = Replace MenuMode layer with ActionMode
LStick Up = Remove this layer
LStick Left = BookPrevPage
LStick Right = BookNextPage
LStick Down = Book

Parent = MenuMode
ShowMenus = MemSpells, MemSpellSlots
Press Auto = Book
Auto = Reset MemSpells
When MoveForward = Replace MenuMode layer with MoveCamera
When AutoRun = Remove this layer

[Layer.MemSpellSlots]
DPad = Select in MemSpellSlots w/ wrap
PS-X = Confirm and close MemSpellSlots
Circle = Remove this layer
R2 = Remove this layer

Parent = MemSpells
ShowMenus = MemSpellSlots ${AllowQuickCast ? QuickMem}
; Display icon of what spell is being memorized
Auto = Slide cursor to DisplaySpellToMem
; Clear ability off cursor by clicking blank part of screen
Release Auto = LClick at MouseLookStart


###############################################################################
## QUICK CAST
##
## If you've enabled the 'AllowQuickCast' setting, spells/etc can also be used
## by holding L2 and then pressing different combinations of 2 face buttons,
## such as "(Hold L2)Triangle->Square" to use a specific action.
##
## Release L2 and re-press it to reset the sequence, or press the last button
## again to re-cast the same thing (such as when a spell fizzles). A visual
## menu will appear while holding L2 to show what each button will do.
##
## The same menu and controls work during spell memorization. You can assign
## a spell to a slot using the same (Hold L2)button->button sequence.
###############################################################################

[Layer.L2Held]
AutoLayers = ${AllowQuickCast ? UseQuickCastMenu}

[Layer.UseQuickCastMenu]
FPad = Select in QuickCast menu
Parent = L2Held
ShowMenus = QuickCast
Auto = Reset QuickCast menu
ButtonSwap = None

[Layer.MemSpells]
Press L2 = ${AllowQuickCast ? Confirm MemSpells}
L2 = ${AllowQuickCast ? Hold TryQuickMem layer}
Release L2 = ${AllowQuickCast ? Remove MemSpellSlots layer}

[Layer.MemSpellSlots]
L2 = ${AllowQuickCast ? Hold TryQuickMem layer}

; Need both TryQuickMem and MemSpellSlots active to actually do quick mem
[Layer.TryQuickMem]
Auto = Do nothing
[Layer.TryQuickMem+MemSpellSlots]
FPad = Choose option in QuickMem menu and close
; Disable normal MemSpellSlots controls
DPad = Do nothing
ShowMenus = QuickMem
Release Auto = Reset QuickMem menu
ButtonSwap = None


###############################################################################
## LAYER MAGEMENT / UTILITY LAYERS
##
## This section mostly doesn't include input assignments, instead focusing on
## commands needed to make other layers work correctly - mostly via adding or
## removing other layers based on certain conditions.
###############################################################################

; Empty layers used purely to trigger combo layers in certain conditions
[Layer.R1Held]
Auto = Do nothing
[Layer.LStickNeutral]
Auto = Do nothing
[Layer.RStickPressed]
Auto = Do nothing
[Layer.RStickNeutral]
Auto = Do nothing

; Track if pressing analog sticks in any direction (mostly for WantMouseCursor)
[Scheme]
Press LStick = Replace LStickNeutral layer with LStickPressed layer
Release LStick = Replace LStickPressed layer with LStickNeutral layer
Press RStick = Replace RStickNeutral layer with RStickPressed layer
Release RStick = Replace RStickPressed layer with RStickNeutral layer

; Auto-add ActionMode when first press LStick in any direction
[Layer.LStickPressed]
AutoLayers = ActionMode

; This waits until stop using analog sticks then switches to cursor mode
; It shows a preview of where cursor will go, and aborts after 1.5 seconds
[Layer.WantMouseCursor]
Hold Auto 1500 = Remove this layer
ShowMenus = CursorPosPreview
; Activate requested cursor mode once stop using analog sticks
; Note how auto-run does NOT prevent cursor mode from starting!
[Layer.WantMouseCursor+LStickNeutral+RStickNeutral]
AutoLayers = CursorMode

; Once MenuMode starts, wait until stop using analog sticks to show cursor
[Layer.MenuMode+LStickNeutral+RStickNeutral]
AutoLayers = MenuModeCursorReady
[Layer.MenuModeCursorReady]
Parent = MenuMode
ShowMenus = Hide InteractReticle
Mouse = Cursor
; For SettingsMenuMode, hide the cursor but still be ready for RStick to move
[Layer.SettingsMenuMode+MenuModeCursorReady]
Mouse = Hide
; Swap from MenuMode to CursorMode if press RStick with MenuModeCursorReady
[Layer.MenuMode+MenuModeCursorReady+RStickPressed]
Auto = Replace MenuMode with CursorMode

; Request cursor control when use any UI-window-opening key bind in Action Mode
[Layer.ActionMode]
When Inventory = Add WantMouseCursor layer
When OpenBags = Add WantMouseCursor layer
When Book = Add WantMouseCursor layer
When OptionsMenu = Add WantMouseCursor layer

; Used to change OpenBags and CloseBags into a plain Bags toggle
[Scheme]
When Bags = Toggle Bags layer
[Layer.Bags]
Press Auto = OpenBags
Release Auto = CloseBags

; Restore cursor control if possibly trying to exit the game
[Scheme]
When Camp = Add WantMouseCursor layer
When CampToDesktop = Add WantMouseCursor layer
When QuickExit = Add WantMouseCursor layer

; Request cursor and jump it to LootWindow when likely trying to loot a corpse,
; and allow a rapid looting of a full corpse by just tapping R2 repeatedly.
When Interact = Add QuickLoot layer
When LootTarget = Add QuickLoot layer
[Layer.QuickLoot]
Parent = WantMouseCursor
Auto = Jump cursor to LootWindow1
Release Auto = Temp set NextLootSlotNum to 1
[Layer.QuickLoot+CursorMode]
ShowMenus = QuickLootPreview
Auto = Temp set NextLootSlotNum to 2
R2 = Defer to lower layers
Hold R2 = Remove QuickLoot layer
When Press DPad = Remove QuickLoot layer
When Press RStick = Remove QuickLoot layer
When Press PS-X = Remove QuickLoot layer
When SignalRightClick = Add ${NextLootSlotNum > 14 ? QuickLootEnd : QuickLootSlot} layer
[Layer.QuickLootSlot]
Press Auto = Move cursor to LootWindow${NextLootSlotNum}
Auto = Remove this layer
Release Auto = Temp set NextLootSlotNum to ${NextLootSlotNum+1}
[Layer.QuickLootEnd]
Parent = QuickLoot+CursorMode
Press Auto = Move cursor to LootWindow15
Auto = Temp set NextLootSlotNum to 1
Tap R2 = Replace this layer with QuickLootReset
[Layer.QuickLootReset]
AutoLayers = Remove QuickLoot
Press Auto = MouseWheel Down 12
Auto = Remove this layer
Release Auto = Add QuickLoot layer

; Reset group targeting when do anything that might target anything else
[Layer.ShowLastGroupTarget]
When TargetCycleNPC = Remove this layer
When TargetCyclePC = Remove this layer
When TargetNearestNPC = Remove this layer
When TargetNearestPC = Remove this layer
When TargetLast = Remove this layer
When TargetSelfOrLast = Remove this layer
When LootNearestCorpse = Remove this layer
When LootOwnCorpse = Remove this layer
When Interact = Remove this layer
When Assist = Remove this layer
When Cancel = Remove this layer
When SignalLeftClick = Remove this layer
When SignalRightClick = Remove this layer

; Hide default group target indicator once active target indicator is shown
[Layer.ShowLastGroupTarget+L1Held]
AutoLayers = HideDefaultGroupTarget

; L1+X (or L1+R1+X) should also hide default group target indicator,
; since that's clearly not what L1 is being held down for now
[Layer.CursorMode+L1Held]
When press PS-X = Add HideDefaultGroupTarget layer
[Layer.CursorMode+L1Held+R1Held]
When press PS-X = Add HideDefaultGroupTarget layer

; Hides default group target indicator from above - removed when L1 released
[Layer.HideDefaultGroupTarget]
ShowMenus = Hide TargetGroupDefault
Parent = L1Held

; Sets default group target from L1+D-Left, and also forces the indicator
; to show even if HideDefaultGroupTarget above is active, until L1 released
[Layer.SetDefaultGroupTarget]
Auto = Set TargetCycleGroup default to last key pressed
DPad Left = Set TargetCycleGroup default to last key pressed
ShowMenus = Show TargetGroupDefault
Parent = HideDefaultGroupTarget

; This makes holding L1+R1 also hold Alt after a short delay,
; which in turn causes the game to show item names.
[Layer.L1Held+R1Held]
AutoLayers = DelayedShowNames
[Layer.CursorMode+L1Held+R1Held]
When press PS-X = Remove DelayedShowNames layer
[Layer.DelayedShowNames]
Parent = L1Held+R1Held
Hold Auto 500 = Add ShowNames layer
[Layer.ShowNames]
Parent = DelayedShowNames
Auto = Alt

; Use book hotspots instead of inventory/loot when use Book key bind
; Return to normal hotspots when do anything that closes the book
[Layer.BookHotspots]
Hotspots = Enable SpellBook, Disable Inventory and LootWindow
Priority = 5
When MoveForward = Remove this layer
When AutoRun = Remove this layer
When CloseBook = Remove this layer
[Scheme]
When Book = Add BookHotspots layer

; Used to cycle Hotbar Pages in macros menu but restore to default when done
[Layer.MacroMenusResetHotPage]
Parent = MacrosMode
Press Auto = HotPage1
Release Auto = HotPage1
[Layer.MacrosMenuPrevHotPage]
Parent = MacroMenusResetHotPage
Press Auto = HotPageCycle prev
Auto = Remove this layer
[Layer.MacrosMenuNextHotPage]
Parent = MacroMenusResetHotPage
Press Auto = HotPageCycle next
Auto = Remove this layer


###############################################################################
## KEY BINDS
###############################################################################

[KeyBinds]
Interact = Jump cursor to InteractHotspot, Left-Click, Right-Click
CloseBook = MoveForward
MemSpell1 = RClick SpellSlot1, wait 325, CastSpell1
MemSpell2 = RClick SpellSlot2, wait 325, CastSpell2
MemSpell3 = RClick SpellSlot3, wait 325, CastSpell3
MemSpell4 = RClick SpellSlot4, wait 325, CastSpell4
MemSpell5 = RClick SpellSlot5, wait 325, CastSpell5
MemSpell6 = RClick SpellSlot6, wait 325, CastSpell6
MemSpell7 = RClick SpellSlot7, wait 325, CastSpell7
MemSpell8 = RClick SpellSlot8, wait 325, CastSpell8
; These are placeholders intended to be overidden in custom profile
TargetCyclePC = TargetNearestPC
TargetCycleNPC = TargetNearestNPC
Assist = /assist
WhoTarget = /whotarget
Heading = /loc
LootTarget = /loot
LootNearestCorpse = /tar a \n /loot
LootOwnCorpse = /loot
CampToDesktop = /camp desktop
QuickExit = /exit
; Signal-only key binds used to automatically add or remove certain layers
SignalLeftClick = Signal Only
SignalRightClick = Signal Only
Bags = Signal Only


###############################################################################
## VARIABLES / SETTINGS
###############################################################################

[Variables]
; This allows auto camera rotation when strafe left or right, so can fully
; steer using only the left analog stick while this is active.
; Not recommended if prefer to play in first person mode.
CamSteer = Off
; Enables reticle display to aim clicks while in mouselook mode
ShowReticle = On
; Offsets click position for 3rd-person camera so don't click own character
; Can be set to None, Small, or Large (for different character size)
InteractOffset = None
InteractPos = ${InteractOffset = None ? 50%, 50% : ${InteractOffset = Small ? 54%, 40% : 56%, 36%}}
; Enables L2 + DPad left/right to activate Windows Magnifier shortcut keys
WinMag = Off
; Enabled L2 + FPad 4-dir menu as alternate method for using hotbar
AllowQuickCast = Off
; Allows alternate button mappings using ButtonSwap (Default or EQOA)
ButtonMap = Default
; Used by Quick Loot feature to know which slot to jump cursor to next
NextLootSlotNum = 1

[Hotspots]
InteractHotspot = ${InteractPos}
DisplaySpellToMem = 55%+121, CY-140


###############################################################################
## MENUS
###############################################################################

[Menu.MainMenu]
Style = List
