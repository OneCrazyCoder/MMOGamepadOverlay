Mouse = Move
Back = Replace MenuMode with WantMouseCursor
1 = Windows
2 = Mem Spells: Add MemSpells layer
3 = "Group Size: ${GroupSize}": .GroupSize
4 = Overlay
5 = Game

[Menu.MainMenu.Windows]
1 = Inventory: Inventory
2 = Bags: Bags
3 = Book: Book

[Menu.MainMenu.GroupSize]
Title = Group Size: ${GroupSize}
Default = ${GroupSize}
