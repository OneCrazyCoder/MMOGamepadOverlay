[Menu.MainMenu.Overlay.Close Overlay]
1 = Cancel: ..
2 = Confirm: Quit App

[Menu.MainMenu.Game]
1 = Sit: Sit
2 = Camp: Camp
3 = Desktop: CampToDesktop
4 = Options: OptionsMenu
5 = Window Mode: SwapWindowMode
6 = Fast Quit

[Menu.MainMenu.Game.Fast Quit]
1 = Cancel: ..
2 = Confirm: QuickExit

[Menu.Settings]
Style = List
Position = CX, CY
Alignment = CX, CY
Priority = 2
ItemSize = ${ResScale * 640}, ${ResScale * 64}
FontSize = ${ResScale * 18}
TitleHeight = ${ResScale * 35}
FadeInTime = 125
FadeOutTime = 250
Back = Remove SettingsMenuMode layer
1 = "Auto camera rotate when move: ${CamSteer}": Set CamSteer to ${CamSteer ? Off : On}
2 = "L2+Face Button 'Quick Cast': ${AllowQuickCast}": Set AllowQuickCast to ${AllowQuickCast ? Off : On}
3 = "Face button assignments: ${ButtonMap}": ${ButtonMap}": Set ButtonMap to ${ButtonMap = EQOA ? Default : EQOA}
4 = "Interact reticle displayed: ${ShowReticle}": Set ShowReticle to ${ShowReticle ? Off : On}
5 = "Interact click position offset: ${InteractOffset}": Set InteractOffset to ${InteractOffset = None ? Small : ${InteractOffset = Small ? Large : None}}
6 = "L2+DPad left/right zooms Windows Magnifier: ${WinMag}": Set WinMag to ${WinMag ? Off : On}
7 = "Show 'hotspots' when move mouse w/ D-Pad: ${HotspotGuideAlpha ? On : Off}": Set HotspotGuideAlpha to ${HotspotGuideAlpha ? 0 : 96}
8 = "Max Hotbar Pages in Macros (L2) Menu: ${HotbarPageCount}": Set HotbarPageCount to ${HotbarPageCount >= 10 ? 2 : ${HotbarPageCount+1}} 

[Menu.MainMenu.GroupSize]
Title = Group Size: ${GroupSize}
Default = ${GroupSize}
1-6 = #: Temporarily set GroupSize to #

