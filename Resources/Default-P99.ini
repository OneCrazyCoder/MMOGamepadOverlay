Style = Slots
Title = Spells (1)
TitleHeight = 32
AltLabelWidth = 112
Position = 100%, 8%
ItemType = Rect
ItemSize = 48, 48
Alignment = R, T
SelectedBorderRGB = 230, 126, 34
FadeInTime = 125
FadeOutTime = 250
InactiveDelay = 20000
L = Hotbar (2)
R = Spells (2)
1 = Spell1: CastSpell1
2 = Spell2: CastSpell2
3 = Spell3: CastSpell3
4 = Spell4: CastSpell4

[Menu.Abilities.Spells (2)]
L = ..
R = .Hotbar (1)
1 = Spell5: CastSpell5
